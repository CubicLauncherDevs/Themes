[background]
reference_path = "bg.png"
image_blur = 0.0
image_opacity = 0.22

[colors]
accent = "#22d3ee"
accent-rgb = "34, 211, 238"
accent-hover = "#06b6d4"
accent-active = "#0891b2"
accent-text = "#082f49"
accent-primary = "#22d3ee"
accent-subtle = "rgba(34, 211, 238, 0.10)"
color-success = "#4ade80"
color-success-rgb = "74, 222, 128"
color-error = "#f87171"
color-error-rgb = "248, 113, 113"
color-warning = "#facc15"
color-warning-rgb = "250, 204, 21"
color-info = "#38bdf8"
color-info-rgb = "56, 189, 248"
color-status-starting = "#fb923c"
color-status-started = "#4ade80"
color-status-stopped = "#7dd3fc"
color-status-error = "#f87171"

[text]
primary = "#f0f9ff"
secondary = "#bae6fd"
muted = "#7dd3fc"
tertiary = "#075985"
accent = "#22d3ee"

[backgrounds]
main = "#082f49"
sidebar = "#0c4a6e"
card = "#0c4a6e"
item-active = "#075985"
overlay = "rgba(8, 47, 73, 0.85)"
input = "#075985"

[borders]
color = "#075985"
border = "#075985"
color-hover = "#22d3ee"
radius = "8px"
radius-sm = "4px"
radius-lg = "12px"

[shadows]
shadow-sm = "0 1px 3px rgba(2, 6, 23, 0.50)"
shadow-md = "0 4px 12px rgba(2, 6, 23, 0.60)"
shadow-lg = "0 8px 24px rgba(2, 6, 23, 0.70)"
glow-accent = "0 0 16px rgba(34, 211, 238, 0.20)"
glow-accent-strong = "0 0 32px rgba(34, 211, 238, 0.38)"

[layout]
font-family = "'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
font-size-base = "14px"
font-size-sm = "12px"
font-size-lg = "18px"
transition-fast = "0.12s ease"
transition-base = "0.20s ease"
transition-slow = "0.35s ease"

[backdrop]
dropdown = 10.0
modal = 4.0
overlay = 4.0
viewer = 8.0
float = 8.0
panel = 5.0
button = 4.0

[others]
icon-filter = "invert(1)"
icon-filter-accent = "invert(65%) sepia(95%) saturate(1400%) hue-rotate(160deg) brightness(105%)"
icon-filter-success = "invert(75%) sepia(60%) saturate(500%) hue-rotate(95deg) brightness(105%)"
icon-filter-error = "invert(55%) sepia(80%) saturate(1200%) hue-rotate(335deg) brightness(105%)"
icon-filter-warning = "invert(75%) sepia(95%) saturate(900%) hue-rotate(5deg) brightness(110%)"
icon-filter-info = "invert(65%) sepia(70%) saturate(900%) hue-rotate(175deg) brightness(110%)"
icon-filter-muted = "invert(60%) sepia(30%) saturate(300%) hue-rotate(180deg) brightness(80%)"
bg-sidebar-gradient = "linear-gradient(180deg, #0c4a6e 0%, #082f49 100%)"
bg-card-gradient = "linear-gradient(135deg, #0c4a6e 0%, #082f49 100%)"
surface-rgb = "255, 255, 255"
surface-dropdown = "#0c4a6e"
bg-surface = "#0c4a6e"
toast-bg = "rgba(8, 47, 73, 0.92)"
scrollbar-track = "#082f49"
scrollbar-thumb = "#075985"
scrollbar-thumb-hover = "#0ea5e9"
