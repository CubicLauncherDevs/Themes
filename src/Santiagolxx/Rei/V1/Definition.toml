[background]
reference_path = "bg.jpg"
image_blur = 0
image_opacity = 1

[colors]
accent = "#ec452b"
accent-rgb = "236,69,43"
accent-hover = "#e12f13"
accent-active = "#df422a"
accent-text = "#181110"
accent-subtle = "rgba(236,69,43,0.08)"
color-success = "#72c47e"
color-success-rgb = "114,196,126"
color-error = "#e86060"
color-error-rgb = "232,96,96"
color-warning = "#e8b040"
color-warning-rgb = "232,176,64"
color-info = "#6aaed4"
color-info-rgb = "106,174,212"
color-status-starting = "#df422a"
color-status-started = "#72c47e"
color-status-stopped = "#290800"
color-status-error = "#e86060"

[text]
primary = "#f6f1f2"
secondary = "#fbf8f6"
muted = "#95796c"
accent = "#ec452b"

[backgrounds]
main = "#010000"
sidebar = "#000000"
card = "#7b2c18"
item-active = "#802f1b"
overlay = "rgba(0,0,0,0.78)"
input = "#69200e"

[borders]
color = "#1f1715"
color-hover = "#6a1f13"
radius = "5px"
radius-sm = "2px"
radius-lg = "8px"

[shadows]
shadow-sm = "0 1px 3px rgba(0,0,0,0.6)"
shadow-md = "0 4px 14px rgba(0,0,0,0.7)"
shadow-lg = "0 8px 28px rgba(0,0,0,0.75)"
glow-accent = "0 0 16px rgba(236,69,43,0.22)"
glow-accent-strong = "0 0 28px rgba(236,69,43,0.38)"

[layout]
font-family = "Cantarell, sans-serif"
font-size-base = "14px"
font-size-sm = "12px"
font-size-lg = "16px"
transition-fast = "0.12s ease"
transition-base = "0.2s ease"
transition-slow = "0.35s ease"

[others]
icon-filter = "invert(40%) sepia(10%) saturate(300%) hue-rotate(0deg) brightness(90%)"
icon-filter-accent = "invert(70%) sepia(60%) saturate(800%) hue-rotate(28deg) brightness(105%)"
icon-filter-success = "invert(65%) sepia(40%) saturate(600%) hue-rotate(90deg) brightness(105%)"
icon-filter-error = "invert(45%) sepia(80%) saturate(4000%) hue-rotate(340deg) brightness(100%)"
icon-filter-warning = "invert(70%) sepia(70%) saturate(700%) hue-rotate(5deg) brightness(108%)"
icon-filter-info = "invert(65%) sepia(30%) saturate(600%) hue-rotate(180deg) brightness(110%)"
icon-filter-muted = "invert(35%) sepia(10%) saturate(300%) hue-rotate(340deg) brightness(80%)"
scrollbar-track = "#000000"
scrollbar-thumb = "#78412f"
scrollbar-thumb-hover = "#9d6857"
