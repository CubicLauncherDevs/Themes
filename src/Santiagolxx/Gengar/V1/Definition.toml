[background]
reference_path = "bg.jpg"
image_blur = 32
image_opacity = 1

[colors]
accent = "#8b5cf6"
accent-rgb = "139,92,246"
accent-hover = "#a78bfa"
accent-active = "#7c3aed"
accent-text = "#f5e8ff"
accent-subtle = "rgba(139,92,246,0.12)"
color-success = "#5acd76"
color-success-rgb = "90,205,118"
color-error = "#ff5a5a"
color-error-rgb = "255,90,90"
color-warning = "#ffb347"
color-warning-rgb = "255,179,71"
color-info = "#6b9bff"
color-info-rgb = "107,155,255"
color-status-starting = "#8b5cf6"
color-status-started = "#4c3f8e"
color-status-stopped = "#0d0415"
color-status-error = "#ff5a5a"

[text]
primary = "#e8d5ff"
secondary = "#f5e8ff"
muted = "#7a5a9e"
accent = "#ff5a7a"

[backgrounds]
main = "#0d0415"
sidebar = "#0f051a"
card = "#1a0f2e"
item-active = "#2d1b4a"
overlay = "rgba(13,4,21,0.85)"
input = "#0a0310"

[borders]
color = "#2d1b4a"
color-hover = "#4a2d7f"
radius = "3px"
radius-sm = "2px"
radius-lg = "5px"

[shadows]
shadow-sm = "0 1px 3px rgba(0,0,0,0.8)"
shadow-md = "0 4px 14px rgba(0,0,0,0.85)"
shadow-lg = "0 8px 28px rgba(0,0,0,0.9)"
glow-accent = "0 0 16px rgba(139,92,246,0.3)"
glow-accent-strong = "0 0 28px rgba(139,92,246,0.45)"

[layout]
font-family = "Space Grotesk, sans-serif"
font-size-base = "14px"
font-size-sm = "12px"
font-size-lg = "16px"
transition-fast = "0.12s ease"
transition-base = "0.2s ease"
transition-slow = "0.35s ease"

[others]
icon-filter = "invert(92%) sepia(25%) saturate(350%) hue-rotate(260deg) brightness(100%)"
icon-filter-accent = "invert(45%) sepia(85%) saturate(2000%) hue-rotate(280deg) brightness(110%)"
icon-filter-success = "invert(65%) sepia(45%) saturate(600%) hue-rotate(100deg) brightness(105%)"
icon-filter-error = "invert(45%) sepia(100%) saturate(3000%) hue-rotate(0deg) brightness(105%)"
icon-filter-warning = "invert(70%) sepia(65%) saturate(700%) hue-rotate(10deg) brightness(110%)"
icon-filter-info = "invert(55%) sepia(40%) saturate(500%) hue-rotate(210deg) brightness(105%)"
icon-filter-muted = "invert(40%) sepia(20%) saturate(300%) hue-rotate(260deg) brightness(75%)"
scrollbar-track = "#0d0415"
scrollbar-thumb = "#2d1b4a"
scrollbar-thumb-hover = "#4a2d7f"
