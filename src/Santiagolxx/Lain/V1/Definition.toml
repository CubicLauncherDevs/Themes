[background]
reference_path = "bg.jpg"
image_blur = 1.0
image_opacity = 0.8

[backgrounds]
  main = "#0a0d12"
  sidebar = "#0d1016"
  card = "#10141c"
  item-active = "#151a28"
  overlay = "rgba(10,13,18,0.9)"
  input = "#08090f"

[colors]
  accent = "#7aaa8a"
  accent-rgb = "122,170,138"
  accent-hover = "#a8d5ba"
  accent-active = "#5a8a6a"
  accent-text = "#0a0d12"
  accent-subtle = "rgba(122,170,138,0.12)"
  color-success = "#a8d5ba"
  color-success-rgb = "168,213,186"
  color-error = "#da6060"
  color-error-rgb = "218,96,96"
  color-warning = "#d8a050"
  color-warning-rgb = "216,160,80"
  color-info = "#7aaa8a"
  color-info-rgb = "122,170,138"
  color-status-starting = "#7aaa8a"
  color-status-started = "#a8d5ba"
  color-status-stopped = "#0a0d12"
  color-status-error = "#da6060"

[text]
  primary = "#d8d4cc"
  secondary = "#e8e4dc"
  muted = "#6a7080"
  accent = "#a8d5ba"

[borders]
  color = "#1a2538"
  color-hover = "#2a4038"
  radius = "6px"
  radius-sm = "3px"
  radius-lg = "10px"

[shadows]
  shadow-sm = "0 1px 3px rgba(0,0,0,0.85)"
  shadow-md = "0 4px 14px rgba(0,0,0,0.9)"
  shadow-lg = "0 8px 28px rgba(0,0,0,0.95)"
  glow-accent = "0 0 12px rgba(122,170,138,0.25)"
  glow-accent-strong = "0 0 20px rgba(122,170,138,0.35)"

[others]
  icon-filter = "invert(86%) sepia(4%) saturate(120%) hue-rotate(200deg) brightness(94%)"
  icon-filter-accent = "invert(72%) sepia(25%) saturate(350%) hue-rotate(130deg) brightness(105%)"
  icon-filter-success = "invert(75%) sepia(20%) saturate(350%) hue-rotate(120deg) brightness(108%)"
  icon-filter-error = "invert(40%) sepia(65%) saturate(1500%) hue-rotate(350deg) brightness(100%)"
  icon-filter-warning = "invert(65%) sepia(45%) saturate(500%) hue-rotate(25deg) brightness(105%)"
  icon-filter-info = "invert(72%) sepia(25%) saturate(350%) hue-rotate(130deg) brightness(105%)"
  icon-filter-muted = "invert(38%) sepia(8%) saturate(200%) hue-rotate(120deg) brightness(70%)"
  scrollbar-track = "#0a0d12"
  scrollbar-thumb = "#1a2538"
  scrollbar-thumb-hover = "#2a4038"

