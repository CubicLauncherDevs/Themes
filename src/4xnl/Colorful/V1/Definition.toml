[background]
reference_path = "bg.png"
image_blur = 24
image_opacity = 0.7

[colors]
accent = "#f8a995"
accent-rgb = "248,169,149"
accent-hover = "#fab8a8"
accent-active = "#e88a78"
accent-text = "#0e0a09"
accent-subtle = "rgba(248,169,149,0.12)"
color-success = "#a8d8a0"
color-success-rgb = "168,216,160"
color-error = "#f08080"
color-error-rgb = "240,128,128"
color-warning = "#f0b060"
color-warning-rgb = "240,176,96"
color-info = "#a0b8e0"
color-info-rgb = "160,184,224"
color-status-starting = "#a0b8e0"
color-status-started = "#a8d8a0"
color-status-stopped = "#7a5c4e"
color-status-error = "#f08080"

[text]
primary = "#f0e4dc"
secondary = "#c4a898"
muted = "#7a5c4e"
accent = "#f8c8a8"

[backgrounds]
main = "#0e0a09"
sidebar = "#120c0a"
card = "#1a1410"
item-active = "#241c16"
overlay = "rgba(14,10,9,0.85)"
input = "#16100c"

[borders]
color = "#2e2018"
color-hover = "#4a3428"
radius = "10px"
radius-sm = "6px"
radius-lg = "16px"

[shadows]
shadow-sm = "0 2px 6px rgba(0,0,0,0.5)"
shadow-md = "0 6px 20px rgba(0,0,0,0.55)"
shadow-lg = "0 12px 40px rgba(0,0,0,0.6)"
glow-accent = "0 0 20px rgba(248,169,149,0.18)"
glow-accent-strong = "0 0 35px rgba(248,169,149,0.3)"

[layout]
font-family = "Cantarell, sans-serif"
font-size-base = "14px"
font-size-sm = "12px"
font-size-lg = "16px"
transition-fast = "0.15s ease"
transition-base = "0.25s ease"
transition-slow = "0.4s ease"

[others]
icon-filter = "invert(88%) sepia(12%) saturate(300%) hue-rotate(340deg) brightness(95%)"
icon-filter-accent = "invert(70%) sepia(60%) saturate(600%) hue-rotate(330deg) brightness(105%)"
icon-filter-success = "invert(70%) sepia(30%) saturate(400%) hue-rotate(70deg) brightness(105%)"
icon-filter-error = "invert(45%) sepia(80%) saturate(4000%) hue-rotate(340deg) brightness(100%)"
icon-filter-warning = "invert(60%) sepia(70%) saturate(700%) hue-rotate(350deg) brightness(105%)"
icon-filter-info = "invert(60%) sepia(30%) saturate(500%) hue-rotate(200deg) brightness(110%)"
icon-filter-muted = "invert(35%) sepia(15%) saturate(200%) hue-rotate(340deg) brightness(70%)"
scrollbar-track = "#0e0a09"
scrollbar-thumb = "#2e2018"
scrollbar-thumb-hover = "#4a3428"
