[background]
reference_path = "bg.jpg"
image_blur = 0.0
image_opacity = 0.8

[backgrounds]
  main = "#282629"
  sidebar = "#1e1d1f"
  card = "#322f33"
  item-active = "#3d383d"
  overlay = "rgba(40,38,41,0.88)"
  input = "#1a191b"

[colors]
  accent = "#CE396F"
  accent-rgb = "206,57,111"
  accent-hover = "#e0457a"
  accent-active = "#b82e60"
  accent-text = "#f0e4dc"
  accent-subtle = "rgba(206,57,111,0.15)"
  color-success = "#98a851"
  color-success-rgb = "152,168,81"
  color-error = "#d45a6a"
  color-error-rgb = "212,90,106"
  color-warning = "#e8a040"
  color-warning-rgb = "232,160,64"
  color-info = "#7a9ab8"
  color-info-rgb = "122,154,184"
  color-status-starting = "#7a9ab8"
  color-status-started = "#98a851"
  color-status-stopped = "#8a7a72"
  color-status-error = "#d45a6a"

[text]
  primary = "#f0e4dc"
  secondary = "#c3b5a4"
  muted = "#8a7a72"
  accent = "#f2a8c8"

[borders]
  color = "#473b39"
  color-hover = "#6a5248"
  radius = "10px"
  radius-sm = "6px"
  radius-lg = "16px"

[shadows]
  shadow-sm = "0 2px 6px rgba(0,0,0,0.55)"
  shadow-md = "0 6px 20px rgba(0,0,0,0.6)"
  shadow-lg = "0 12px 40px rgba(0,0,0,0.7)"
  glow-accent = "0 0 20px rgba(206,57,111,0.2)"
  glow-accent-strong = "0 0 35px rgba(206,57,111,0.35)"

[others]
  icon-filter = "invert(88%) sepia(8%) saturate(200%) hue-rotate(340deg) brightness(95%)"
  icon-filter-accent = "invert(45%) sepia(80%) saturate(3000%) hue-rotate(320deg) brightness(95%)"
  icon-filter-success = "invert(60%) sepia(30%) saturate(400%) hue-rotate(50deg) brightness(95%)"
  icon-filter-error = "invert(45%) sepia(80%) saturate(4000%) hue-rotate(340deg) brightness(100%)"
  icon-filter-warning = "invert(60%) sepia(70%) saturate(700%) hue-rotate(350deg) brightness(105%)"
  icon-filter-info = "invert(50%) sepia(25%) saturate(500%) hue-rotate(180deg) brightness(100%)"
  icon-filter-muted = "invert(35%) sepia(10%) saturate(200%) hue-rotate(340deg) brightness(70%)"
  scrollbar-track = "#282629"
  scrollbar-thumb = "#473b39"
  scrollbar-thumb-hover = "#6a5248"
