[background]
reference_path = "bg.png"
image_blur = 0.0
image_opacity = 0.85

[colors]
accent = "#6EB2C8"
"accent-rgb" = "110, 178, 200"
"accent-hover" = "#88BDCB"
"accent-active" = "#5C9DB0"
"accent-text" = "#E1E9ED"
"accent-subtle" = "rgba(110, 178, 200, 0.15)"

[text]
primary = "#E1E9ED"
secondary = "#B0C1D4"
muted = "#8598AB"
accent = "#6EB2C8"

[borders]
color = "#3B4A51"
"color-hover" = "#6EB2C8"
radius = "10px"
"radius-sm" = "6px"
"radius-lg" = "14px"
width = "1px"

[shadows]
"shadow-sm" = "0 1px 3px rgba(0,0,0,0.4)"
"shadow-md" = "0 4px 8px rgba(0,0,0,0.35)"
"shadow-lg" = "0 8px 24px rgba(0,0,0,0.45)"
"glow-accent" = "0 0 12px rgba(110, 178, 200, 0.25)"
"glow-accent-strong" = "0 0 20px rgba(110, 178, 200, 0.4)"
"glow-error" = "0 0 12px rgba(197, 108, 108, 0.25)"
"glow-success" = "0 0 12px rgba(126, 191, 142, 0.25)"

[backgrounds]
main = "#28323D"
sidebar = "#1F2833"
card = "#33404D"
"item-active" = "#6EB2C8"
overlay = "rgba(0,0,0,0.7)"
input = "#182028"

[layout]
"font-family" = "'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
"font-size-base" = "14px"
"font-size-sm" = "12px"
"font-size-lg" = "16px"

[others]
"icon-filter" = "brightness(0) invert(0.91)"
"icon-filter-accent" = "brightness(0) invert(0.55) sepia(1) saturate(3) hue-rotate(173deg)"
"icon-filter-error" = "brightness(0) invert(0.4) sepia(1) saturate(10) hue-rotate(316deg)"
"icon-filter-success" = "brightness(0) invert(0.65) sepia(1) saturate(3) hue-rotate(85deg)"
"icon-filter-warning" = "brightness(0) invert(0.6) sepia(1) saturate(5) hue-rotate(5deg)"
"icon-filter-info" = "brightness(0) invert(0.65) sepia(0.5) saturate(4) hue-rotate(190deg)"
"icon-filter-muted" = "brightness(0) invert(0.60)"
"color-success" = "#7EBF8E"
"color-success-rgb" = "126, 191, 142"
"color-error" = "#C56C6C"
"color-error-rgb" = "197, 108, 108"
"color-warning" = "#D4A86A"
"color-warning-rgb" = "212, 168, 106"
"color-info" = "#6EB2C8"
"color-info-rgb" = "110, 178, 200"
"color-status-starting" = "#D4A86A"
"color-status-started" = "#7EBF8E"
"color-status-stopped" = "#C56C6C"
"color-status-error" = "#C56C6C"
"scrollbar-track" = "#1F2833"
"scrollbar-thumb" = "#6EB2C8"
"scrollbar-thumb-hover" = "#88BDCB"
"sidebar-width" = "260px"
"transition-fast" = "0.12s ease"
"transition-base" = "0.2s ease"
"transition-slow" = "0.35s ease"

[backdrop]
dropdown = 8.0
modal = 4.0
overlay = 4.0
viewer = 8.0
float = 8.0
panel = 5.0
button = 4.0
